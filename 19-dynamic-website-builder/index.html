<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: black;
        }

        .card {
            display: flex;
            border: 2px solid rgb(37, 37, 37);
            background-color: rgb(37, 37, 37);
            width: 95vw;
            height: 180px;
            border-radius: 7px;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
            margin: 10px;
        }

        .image {
            position: relative;
            /* we added realtive so that we fit the duration capsule in bottom right of the thumbnail image */
            cursor: pointer;

        }

        .image img {
            width: 320px;
            height: 160px;
            object-fit: cover;
            border-radius: 3px;
            display: block;
        }

        .image .capsule {
            position: absolute;
            z-index: 10;
            right: 8px;
            bottom: 10px;
            color: white;
            background-color: rgb(23, 23, 23);
            padding: 2px;
            border-radius: 3px;
            opacity: 0.7;
            font-size: 14px;
        }

        .text h2 {
            color: white;
        }

        .text p {
            color: grey;
            padding-top: 0;
        }

        .text h2,
        p {
            margin-left: 15px;
        }
    </style>
</head>

<body>
    <div class="container"></div>
    <script src="script.js"></script>
</body>

</html>
